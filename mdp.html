<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="CSS/bootstrap.css" rel="stylesheet">
    <link href="CSS/signup.css" rel="stylesheet">
    <title>mdp</title>
</head>

<body>
    <section class="bg">
        <div class="container">
            <div class="row d-flex justify-content-center">
                <div class="col-md-4">
                    <div class="form-wrap">
                        <div class="form-heading">
                            <h1>Récupération</h1>
                            <p>Complétez ces champs pour récupérer votre compte.</p>
                        </div>
                        <form name="regForm" id="regForm">
                            <div class="form-group">
                                <label>Email:</label>
                                <input type="email" class="form-control" id="email" name="" placeholder="Email">
                                <p id="p2"></p>
                            </div>
                            <div class="form-group">
                                <input type="submit" class="btn btn-primary btn-block" id="submit1" value="Recevoir un code de confirmation"><br><br>
                            </div>
                            <div class="form-group">
                                <label>Entrer le code reçu:</label>
                                <input type="password" class="form-control" id="password" name="" placeholder="Password">
                                <p id="p3"></p>
                            </div>
                            <div class="form-group">
                                <input type="submit" class="btn btn-primary btn-block" id="submit2" value="Envoyer"><br><br>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <script type="text/javascript" src="JS/jquery-3.6.1.min.js"></script>
    <script type="text/javascript" src="JS/mdp.js"></script>
</body>

</html>
