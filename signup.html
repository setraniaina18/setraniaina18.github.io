<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="CSS/bootstrap.css" rel="stylesheet">
    <link href="CSS/signup.css" rel="stylesheet">
    <title>Inscription</title>
</head>

<body>
    <section class="bg">
        <div class="container">
            <div class="row d-flex justify-content-center">
                <div class="col-md-4">
                    <div class="form-wrap">
                        <div class="form-heading">
                            <h1>Mada-Microfreelance</h1>
                            <p>Complétez les informations ci-dessous, pour vous permettre de vous connecter et effectuer vos achats et ventes.</p>
                        </div>
                        <form name="regForm" id="regForm">
                            <div class="form-group">
                                <label>Name:</label>
                                <input type="text" class="form-control" id="name" name="" placeholder="Name">
                                <p id="p1"></p>
                            </div>
                            <div class="form-group">
                                <label>Email:</label>
                                <input type="email" class="form-control" id="email" name="" placeholder="Email">
                                <p id="p2"></p>
                            </div>
                            <div class="form-group">
                                <label>Password:</label>
                                <input type="password" class="form-control" id="password" name="" placeholder="Password">
                                <p id="p3"></p>
                            </div>
                            <div class="form-group">
                                <label>Password again:</label>
                                <input type="password" class="form-control" id="confirmpassword" name="" placeholder="Confirm again">
                                <p id="p4"></p>
                            </div>
                            <div>
                                <p id="case"><input id="checkbox" type="checkbox" name="case" value="1" required> Je déclare avoir lu et j’accepte les <a href="">conditions générales d’utilisation.</a></p>
                            </div>
                            <div class="form-group">
                                <input type="submit" class="btn btn-primary btn-block" id="submit">
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <script type="text/javascript" src="JS/jquery-3.6.1.min.js"></script>
    <script type="text/javascript" src="JS/signup.js"></script>
</body>

</html>
